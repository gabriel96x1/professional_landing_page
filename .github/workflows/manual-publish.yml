name: Manual publish

on:
  workflow_dispatch:

concurrency:
  group: manual-publish
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  lint:
    name: Linter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linter
        run: bun run lint

  format:
    name: Formatter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bunx prettier --check .

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install browser runtime
        run: bunx playwright install --with-deps chromium

      - name: Run unit tests
        run: bun run test

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build application
        run: bun run build

  sast:
    name: SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep scan --config auto --error

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - lint
      - format
      - unit-tests
      - build
      - sast
    environment:
      name: production
      url: ${{ steps.publish.outputs.deployment_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Verify Vercel secrets
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          missing=0
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::Missing GitHub secret: VERCEL_TOKEN"
            missing=1
          fi
          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "::error::Missing GitHub secret: VERCEL_ORG_ID"
            missing=1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::error::Missing GitHub secret: VERCEL_PROJECT_ID"
            missing=1
          fi
          exit "$missing"

      - name: Publish to Vercel
        id: publish
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          deployment_output="$(bunx vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN")"
          echo "$deployment_output"
          deployment_url="$(printf '%s\n' "$deployment_output" | tail -n 1)"
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
