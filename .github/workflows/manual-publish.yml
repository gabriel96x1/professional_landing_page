name: Deploy to Vercel

on:
  workflow_dispatch:

concurrency:
  group: deploy-production-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  lint:
    name: Linter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linter
        run: bun run lint

  format:
    name: Formatter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bunx prettier --check .

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install browser runtime
        run: bunx playwright install --with-deps chromium

      - name: Run unit tests
        run: bun run test

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build application
        run: bun run build

  sast:
    name: SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Semgrep
        run: semgrep scan --config auto --error

  publish:
    name: Deploy production
    runs-on: ubuntu-latest
    needs:
      - lint
      - format
      - unit-tests
      - build
      - sast
    environment:
      name: production
      url: ${{ steps.publish.outputs.deployment_url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_TEAM_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      NO_COLOR: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Verify Vercel secrets
        run: |
          missing=0
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::Missing GitHub secret: VERCEL_TOKEN"
            missing=1
          fi
          if [ -z "$VERCEL_TEAM_ID" ]; then
            echo "::error::Missing GitHub secret: VERCEL_TEAM_ID"
            missing=1
          fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::error::Missing GitHub secret: VERCEL_PROJECT_ID"
            missing=1
          fi
          exit "$missing"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Vercel CLI
        run: bun add --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --team "$VERCEL_TEAM_ID"

      - name: Build Vercel output
        run: vercel build --prod --team "$VERCEL_TEAM_ID"

      - name: Deploy prebuilt output to Vercel
        id: publish
        run: |
          deployment_url="$(vercel deploy --prebuilt --prod --team "$VERCEL_TEAM_ID")"
          printf '%s\n' "$deployment_url"
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
